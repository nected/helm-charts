apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "common.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "common.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.customCA.enabled }}
      initContainers:
        - name: ca-bundle-builder
          image: {{ .Values.customCA.initContainer.image | default (printf "%s:%s" .Values.image.repository (.Values.image.tag | default .Chart.AppVersion)) }}
          imagePullPolicy: {{ .Values.customCA.initContainer.imagePullPolicy | default .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              TARGET=/shared/ca-certificates.crt
              : > "$TARGET"
              {{- if .Values.customCA.includeSystemBundle }}
              for p in /etc/ssl/certs/ca-certificates.crt /etc/pki/tls/certs/ca-bundle.crt /etc/ssl/cert.pem; do
                if [ -f "$p" ]; then
                  cat "$p" > "$TARGET"
                  break
                fi
              done
              {{- end }}
              if [ -d /customer-ca ]; then
                for f in /customer-ca/*; do
                  [ -f "$f" ] || continue
                  printf '\n' >> "$TARGET"
                  cat "$f" >> "$TARGET"
                done
              fi
              chmod 0444 "$TARGET"
          volumeMounts:
            - name: custom-ca
              mountPath: /customer-ca
              readOnly: true
            - name: ca-bundle
              mountPath: /shared
          {{- with .Values.customCA.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.image.args }}
          args: 
            {{- range .Values.image.args }}
            - {{ . }}
            {{- end }}
          {{- end}}
          {{- with .Values.existingSecretMap }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (not .Values.mountConfigMap) .Values.existingSecret }}
          envFrom:
          {{- if not .Values.mountConfigMap }}
          - configMapRef:
              name: {{ include "common.fullname" . }}
          {{- end }}
          {{- with .Values.existingSecret }}
          - secretRef:
              name: {{ . }}
          {{- end }}
          {{- end }}
          {{- if .Values.service }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /mnt/temp
              name: {{ include "common.name" . }}-cm-volume
            {{- if .Values.customCA.enabled }}
            {{- range .Values.customCA.trustBundlePaths }}
            - name: ca-bundle
              mountPath: {{ . }}
              subPath: ca-certificates.crt
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end}}
      volumes:
        - name: {{ include "common.name" . }}-cm-volume
          configMap:
            name: {{ include "common.fullname" . }}
            items:
              - path: envFile
                {{- if .Values.mountConfigMap }}
                key: envFile
                {{- else }}
                key: ENVFILE_DEFAULT_VALUE
                {{- end }}
        {{- if .Values.customCA.enabled }}
        - name: custom-ca
          secret:
            secretName: {{ required "customCA.secretName is required when customCA.enabled is true" .Values.customCA.secretName }}
            defaultMode: {{ .Values.customCA.defaultMode }}
            {{- with .Values.customCA.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        - name: ca-bundle
          emptyDir: {}
        {{- end }}
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end}}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
