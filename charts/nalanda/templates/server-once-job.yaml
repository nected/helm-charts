{{- if .Values.autoSetup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "common.fullname" . }}-setup
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    {{- include "common.autoSetupPodAnnotationsHook" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: {{ .Values.autoSetup.backoffLimit }}
  template:
    metadata:
      name: {{ include "common.fullname" . }}-setup
      labels:
        {{- include "common.labels" . | nindent 8 }}
    spec:
        containers:
          - name: setup
            image: {{ .Values.autoSetup.image.repository }}:{{ .Values.autoSetup.image.tag }}
            imagePullPolicy: {{ .Values.autoSetup.image.pullPolicy }}
            {{- with .Values.autoSetup.command }}
            command:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- with .Values.autoSetup.args }}
            args:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- with .Values.existingSecretMap }}
            env:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- if or (not .Values.mountConfigMap) .Values.existingSecret }}
            envFrom:
            {{- if not .Values.mountConfigMap }}
            - configMapRef:
                name: {{ include "common.fullname" . }}
            {{- end }}
            {{- with .Values.existingSecret }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- end }}
            {{- with .Values.autoSetup.resources }}
            resources:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            volumeMounts:
              - mountPath: /mnt/temp
                name: {{ include "common.name" . }}-cm-volume
              {{- if .Values.volumeMounts }}
              {{- toYaml .Values.volumeMounts | nindent 14 }}
              {{- end }}
        volumes:
          - name: {{ include "common.name" . }}-cm-volume
            configMap:
              name: {{ include "common.fullname" . }}
              items:
                - path: envFile
                  {{- if .Values.mountConfigMap }}
                  key: envFile
                  {{- else }}
                  key: ENVFILE_DEFAULT_VALUE
                  {{- end }}
          {{- if .Values.volumes }}
          {{- toYaml .Values.volumes| nindent 10 }}
          {{- end }}
        {{- with .Values.nodeSelector }}
        nodeSelector:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.affinity }}
        affinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.tolerations }}
        tolerations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        restartPolicy: OnFailure
{{- end}}